<!DOCTYPE html>
<html>
<head>
<title>Search Results</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h2>Search Results</h2>

<table>

<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
</tr>

{% for i in data %}

<tr>
<td>{{i.patient}}</td>
<td>{{i.doctor}}</td>
<td>{{i.date}}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
