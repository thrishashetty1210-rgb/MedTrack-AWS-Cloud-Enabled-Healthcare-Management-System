<!DOCTYPE html>
<html>
<head>
<title>Diagnosis Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Diagnosis Result</h2>

<table border="1">

<tr>
<th>Patient ID</th>
<th>Doctor ID</th>
<th>Report</th>
</tr>

{% for d in data %}

<tr>
<td>{{ d.patient_id }}</td>
<td>{{ d.doctor_id }}</td>
<td>{{ d.report }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/patient_dashboard">Back</a>

</body>
</html>
