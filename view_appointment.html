<!DOCTYPE html>
<html>
<head>
<title>View Appointments</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<h2>Appointments</h2>

<table border="1">

<tr>
<th>Patient</th>
<th>Doctor</th>
<th>Date</th>
</tr>

{% for a in data %}

<tr>
<td>{{ a.patient }}</td>
<td>{{ a.doctor }}</td>
<td>{{ a.date }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/admin_dashboard">Back</a>

</body>
</html>
